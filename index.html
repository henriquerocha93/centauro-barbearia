<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Centauro Barbearia | Premium Grooming</title>
    <link rel="stylesheet" href="styles.css">
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#050505">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
    <div id="app" class="container">
        <!-- VERSION INDICATOR -->
        <div style="background: var(--accent-color); color: #000; padding: 5px; text-align: center; font-size: 0.7rem; font-weight: bold; opacity: 0.8;">
             SISTEMA ATUALIZADO (v4.5) - MULTI-SERVIÇOS LIBERADO
        </div>
        <!-- Renderização Dinâmica aqui -->
        <header class="fade-in">
            <div class="logo-container">
                <img src="logo_centauro.png" alt="Centauro Barbearia Logo" id="main-logo">
            </div>
            <h1 id="shop-title">Centauro <span style="font-size: 0.6rem; opacity: 0.5;">v4.5</span></h1>
            <p id="shop-subtitle" style="color: var(--text-secondary); letter-spacing: 2px; text-transform: uppercase; font-size: 0.8rem;">Barbearia de Elite</p>
        </header>

        <main id="main-content">
            <!-- Conteúdo injetado via JS -->
        </main>

        <nav id="bottom-nav" class="glass" style="position: fixed; bottom: 20px; left: 20px; right: 20px; display: none;">
            <!-- Navegação para quando logado -->
        </nav>

    </div>

    <dialog id="app-modal" class="glass" style="padding: 0; border: 1px solid var(--glass-border); border-radius: 15px; color: var(--text-primary); max-width: 400px; width: 90%;">
        <!-- Conteúdo injetado via JS -->
    </dialog>

    <style>
        dialog::backdrop {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
        }
        dialog section {
            padding: 25px;
        }
    </style>

    <script src="app_v13.js?v=4" type="module"></script>
</body>
</html>
