<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agendamento Fácil BR | Gestão Inteligente v71.10</title>

    <link rel="stylesheet" href="styles.css?v=103">
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#050505">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="favicon.png">
    
    <script src="app_v14.js?v=71.10" type="module"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        window.addEventListener('load', () => {
            console.log('Sistema Centauro v71.00 Carregado');
            
            // Removemos o Service Worker para evitar o bloqueio (ERR_FAILED) offline
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.getRegistrations().then(function(registrations) {
                    for(let registration of registrations) {
                        registration.unregister();
                    }
                });
            }
        });
    </script>
</head>
<body>
    <div id="app" class="container">
        <!-- Renderização Dinâmica total via JS para o visual Vintage -->
    </div>

    <dialog id="app-modal" class="glass" style="padding: 0; border: 1px solid var(--glass-border); border-radius: 15px; color: var(--text-primary); max-width: 400px; width: 90%; max-height: 90vh; overflow-y: auto;">
        <!-- Conteúdo injetado via JS -->
    </dialog>

    <style>
        dialog::backdrop {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
        }
        dialog section {
            padding: 25px;
        }
    </style>
</body>
</html>
