<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Hub | Agendamento Fácil BR</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --p-dark: #1e1b4b;
            --p-main: #4c1d95;
            --p-light: #7c3aed;
            --accent: #f97316;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: #0f172a;
            background-image: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            margin: 0;
        }

        .screen { display: none; }
        .screen.active { display: block; }

        /* Login Screen Futuristic */
        #login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .login-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Header Futuristic */
        .master-header {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin: 40px 0;
        }

        .stat-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 25px;
            border-radius: 20px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .stat-card:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-5px);
            border-color: var(--p-light);
        }
        .stat-card h3 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #94a3b8;
            margin: 0;
        }
        .stat-card .value {
            font-size: 2.5rem;
            font-weight: 800;
            margin: 10px 0;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Action Buttons */
        .nav-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }
        .btn-action {
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: var(--glass);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-action:hover {
            background: var(--p-light);
            border-color: transparent;
            box-shadow: 0 0 20px rgba(124, 58, 237, 0.4);
        }
        .btn-main {
            background: var(--accent);
            border: none;
            box-shadow: 0 0 20px rgba(249, 115, 22, 0.3);
        }
        .btn-main:hover {
            background: #ea580c;
            box-shadow: 0 0 30px rgba(249, 115, 22, 0.5);
        }

        /* Tenant Card */
        .tenants-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }
        .tenant-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            transition: all 0.3s;
            position: relative;
        }
        .tenant-card:hover {
            border-color: var(--p-light);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .status-badge {
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
        }
    </style>
</head>

<body>

    <!-- TELA DE LOGIN -->
    <div id="login-screen" class="screen active">
        <div class="login-card">
            <div style="text-align: center; margin-bottom: 30px;">
                <img src="../logo_br.png" alt="Logo" style="height: 200px; filter: drop-shadow(0 0 20px rgba(255,255,255,0.3));">
                <h2 style="margin-top: 10px; font-weight: 800; letter-spacing: -1px;">CENTRAL MASTER</h2>
            </div>

            <form id="master-login-form">
                <div style="margin-bottom: 20px;">
                    <label style="font-size: 0.8rem; color: #94a3b8; display: block; margin-bottom: 8px;">IDENTIFICAÇÃO</label>
                    <input type="text" id="master-login" placeholder="Usuário" required 
                        style="width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); padding: 14px; border-radius: 12px; color: white; box-sizing: border-box;">
                </div>
                <div style="margin-bottom: 30px;">
                    <label style="font-size: 0.8rem; color: #94a3b8; display: block; margin-bottom: 8px;">CHAVE DE ACESSO</label>
                    <input type="password" id="master-password" placeholder="••••••••" required 
                        style="width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); padding: 14px; border-radius: 12px; color: white; box-sizing: border-box;">
                </div>
                <button type="submit" class="btn-action btn-main" style="width: 100%; justify-content: center; padding: 16px; font-size: 1rem;">ACESSAR PAINEL</button>
            </form>
        </div>
    </div>

    <!-- TELA DE DASHBOARD -->
    <div id="dashboard-screen" class="screen">
        <header class="master-header">
            <div class="header-container">
                <img src="../logo_br.png" alt="Logo" style="height: 120px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));">
                <div style="display: flex; align-items: center; gap: 20px;">
                    <span style="font-size: 0.9rem; font-weight: 500; color: #94a3b8;">Sessão Master Ativa</span>
                    <button onclick="logout()" style="background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: 600;">Sair</button>
                </div>
            </div>
        </header>

        <main style="max-width: 1200px; margin: 0 auto; padding: 40px 20px;">
            <div style="margin-bottom: 40px;">
                <h1 style="font-size: 2.5rem; font-weight: 900; margin: 0; background: linear-gradient(to right, #fff, #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Painel de Inquilinos</h1>
                <p style="color: #94a3b8; font-size: 1.1rem;">Bem-vindo ao centro de operações do Agendamento Fácil BR.</p>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Faturamento Total</h3>
                    <div class="value" id="stats-revenue" style="color: #10b981;">R$ 0,00</div>
                    <div style="height: 4px; width: 100%; background: rgba(16, 185, 129, 0.2); border-radius: 2px;"></div>
                </div>
                <div class="stat-card">
                    <h3>Unidades Ativas</h3>
                    <div class="value" id="stats-active">0</div>
                    <div style="height: 4px; width: 100%; background: rgba(124, 58, 237, 0.2); border-radius: 2px;"></div>
                </div>
                <div class="stat-card">
                    <h3>Aguardando PGTO</h3>
                    <div class="value" id="stats-pending" style="color: #ef4444;">0</div>
                    <div style="height: 4px; width: 100%; background: rgba(239, 68, 68, 0.2); border-radius: 2px;"></div>
                </div>
            </div>

            <div class="nav-actions">
                <button class="btn-action" onclick="app.setTab('tenants')">👥 Barbearias</button>
                <button class="btn-action" onclick="app.setTab('billing')">💳 Faturamento SaaS</button>
                <button class="btn-action" onclick="app.setTab('leads')">🎯 Leads</button>
                <button class="btn-action" onclick="window.location.href='vendedor.html'">🤝 Vendedores</button>
                <button class="btn-action" onclick="app.setTab('config')">⚙️ Perfil Master</button>
                <button class="btn-action btn-main" onclick="app.openNewTenantModal()" style="margin-left: auto;">+ CRIAR NOVA UNIDADE</button>
            </div>

            <div class="tenants-grid" id="tenants-list">
                <!-- Injetado via JS -->
                <p style="color: #94a3b8; font-style: italic;">Sincronizando com a base de dados...</p>
            </div>
        </main>
    </div>

    <!-- MODAIS (REUTILIZANDO LÓGICA EXISTENTE) -->
    <dialog id="new-tenant-modal" class="modal" style="background: #1e293b; color: white; border: 1px solid var(--glass-border); border-radius: 20px; padding: 30px; width: 90%; max-width: 500px;">
        <h3 style="margin-top: 0;">Nova Barbearia</h3>
        <form id="new-tenant-form">
            <input type="text" id="t-name" placeholder="Nome do Estabelecimento" required style="width: 100%; margin-bottom: 10px; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white;">
            <select id="t-type" style="width: 100%; margin-bottom: 10px; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white;">
                <option value="barbershop">💈 Barbearia</option>
                <option value="beauty_salon">💇‍♀️ Estética / Salão</option>
            </select>
            <input type="text" id="t-slug" placeholder="slug-do-link" required style="width: 100%; margin-bottom: 10px; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white;">
            <div style="display: flex; gap: 10px;">
                <input type="number" id="t-price" value="99.90" step="0.01" style="flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white;">
                <input type="text" id="t-phone" placeholder="WhatsApp" style="flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white;">
            </div>
            <div style="margin-top: 20px; text-align: right;">
                <button type="button" onclick="this.closest('dialog').close()" style="background: none; border: none; color: #94a3b8; cursor: pointer; margin-right: 15px;">Cancelar</button>
                <button type="submit" class="btn-action btn-main">Criar Sistema</button>
            </div>
        </form>
    </dialog>

    <script>
        function logout() {
            localStorage.removeItem('master_auth');
            window.location.reload();
        }
    </script>
    <script type="module" src="app.js?v=1010"></script>
</body>

</html>
