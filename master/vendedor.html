<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Vendedor | Agendamento Fácil</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #10b981; /* Green for sellers */
            --primary-dark: #065f46;
        }
        .screen { display: none; }
        .screen.active { display: block; }
        .glass-card { background: white; border-radius: 12px; padding: 25px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 5px; color: #4b5563; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 8px; }
        .btn-green { background: #10b981; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .btn-green:hover { background: #059669; }
    </style>
</head>
<body style="background: #f3f4f6; font-family: 'Inter', sans-serif;">

    <!-- Login Screen -->
    <div id="login-screen" class="screen active" style="height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #065f46 0%, #10b981 100%);">
        <div class="glass-card" style="width: 100%; max-width: 350px; text-align: center;">
            <img src="../logo.png" alt="Agendamento Fácil" style="height: 160px; width: auto; margin-bottom: 10px;">
            <h2 style="margin-bottom: 20px; font-family: 'Playfair Display'; color: #111; font-size: 1.1rem;">Portal do Vendedor</h2>
            <form id="seller-login-form">
                <div class="form-group" style="text-align: left;">
                    <label>Usuário</label>
                    <input type="text" id="s-login" required placeholder="Seu login">
                </div>
                <div class="form-group" style="text-align: left;">
                    <label>Senha</label>
                    <input type="password" id="s-pass" required placeholder="Sua senha">
                </div>
                <button type="submit" class="btn-green" style="width: 100%; margin-top: 10px;">Entrar no Painel</button>
            </form>
        </div>
    </div>

    <!-- Dashboard Screen -->
    <div id="dashboard-screen" class="screen">
        <header style="background: #065f46; color: white; padding: 15px 0;">
            <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
                <img src="../logo.png" alt="Agendamento Fácil" style="height: 100px; width: auto;">
                <div>
                    <span id="welcome-name" style="margin-right: 15px; font-size: 0.9rem;">Olá, Vendedor</span>
                    <button onclick="location.reload()" class="btn-outline" style="color: white; border-color: rgba(255,255,255,0.3); font-size: 0.8rem; padding: 5px 10px;">Sair</button>
                </div>
            </div>
        </header>

        <main class="container" style="padding: 40px 20px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <div>
                    <h1 style="font-size: 1.8rem; color: #111;">Minhas Vendas</h1>
                    <p style="color: #6b7280;">Cadastre novos clientes e acompanhe a ativação.</p>
                </div>
                <button class="btn-green" onclick="document.getElementById('new-client-modal').showModal()">+ Cadastrar Nova Venda</button>
            </div>

            <div id="clients-list" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px;">
                <!-- Clientes inseridos via JS -->
            </div>
        </main>
    </div>

    <!-- Modal Novo Cliente -->
    <dialog id="new-client-modal" class="glass-card" style="width: 90%; max-width: 500px; border: none; border-radius: 16px;">
        <h2 style="margin-bottom: 20px; color: #065f46;">🛒 Cadastrar Novo Cliente</h2>
        <form id="new-client-form">
            <div class="form-group">
                <label>Nome da Barbearia</label>
                <input type="text" id="t-name" required placeholder="Ex: Barbearia do Zé">
            </div>
            <div class="form-group">
                <label>Link de Acesso (Link da Loja)</label>
                <input type="text" id="t-slug" required placeholder="Ex: barbeariadoze" style="text-transform: lowercase;">
                <small style="color: #6b7280;">O link será: centauro-barbearia.vercel.app/?loja=<b>slug</b></small>
            </div>
            
            <div style="display: flex; gap: 15px;">
                <div class="form-group" style="flex: 1;">
                    <label>Login do Admin</label>
                    <input type="text" id="t-admin-user" required placeholder="Ex: admin">
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Senha do Admin</label>
                    <input type="text" id="t-admin-pass" required placeholder="Ex: 1234">
                </div>
            </div>

            <div class="form-group">
                <label>Telefone do Cliente (WhatsApp)</label>
                <input type="tel" id="t-phone" required placeholder="Ex: 51999999999">
            </div>

            <div class="form-group">
                <label>Valor da Mensalidade (R$)</label>
                <input type="number" id="t-price" step="0.01" required placeholder="Ex: 99.90">
            </div>

            <div style="background: #fffbeb; padding: 15px; border-radius: 8px; border: 1px solid #fde68a; margin-bottom: 20px;">
                <p style="font-size: 0.8rem; color: #92400e; margin: 0;">⚠️ O sistema será criado como <b>BLOQUEADO</b>. O administrador mestre irá ativar após confirmar o pagamento.</p>
            </div>

            <div style="text-align: right; display: flex; gap: 10px; justify-content: flex-end;">
                <button type="button" onclick="document.getElementById('new-client-modal').close()" class="btn-outline">Cancelar</button>
                <button type="submit" id="btn-submit" class="btn-green">Criar e Enviar p/ Aprovação</button>
            </div>
        </form>
    </dialog>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCFG_Q7IekAUNfTQZWRPHduuaFmLTSxVv4",
            authDomain: "centauro-barbearia.firebaseapp.com",
            projectId: "centauro-barbearia",
            storageBucket: "centauro-barbearia.firebasestorage.app",
            messagingSenderId: "96712816127",
            appId: "1:96712816127:web:8cc5dde933fbb09b2523ca",
            databaseURL: "https://centauro-barbearia-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.onerror = function(msg, url, line) {
            alert("Erro no sistema: " + msg + "\nLinha: " + line);
            return false;
        };

        let currentSeller = null;

        // Auto-login from URL
        window.addEventListener('load', () => {
            const params = new URLSearchParams(window.location.search);
            const u = params.get('u');
            const p = params.get('p');
            if (u && p) {
                document.getElementById('s-login').value = u;
                document.getElementById('s-pass').value = atob(p);
                setTimeout(() => {
                    document.getElementById('seller-login-form').dispatchEvent(new Event('submit'));
                }, 500);
            }
        });

        // Login Logic
        document.getElementById('seller-login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const user = document.getElementById('s-login').value.trim().toLowerCase();
            const pass = document.getElementById('s-pass').value;

            if (!user || !pass) {
                alert('Preencha todos os campos!');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Autenticando...';

            try {
                const sellerPath = 'master/sellers/' + user;
                const snapshot = await get(ref(db, sellerPath));
                
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    if (data.password === pass) {
                        currentSeller = { ...data, username: user };
                        document.getElementById('login-screen').style.display = 'none';
                        document.getElementById('dashboard-screen').classList.add('active');
                        document.getElementById('welcome-name').textContent = 'Olá, ' + (data.name || user);
                        loadMyClients();
                    } else {
                        alert('Senha incorreta para o vendedor!');
                    }
                } else {
                    alert('Usuário "' + user + '" não encontrado.');
                }
            } catch (err) {
                console.error(err);
                alert('Erro de conexão: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Entrar no Painel';
            }
        });


        async function loadMyClients() {
            const tenantsRef = ref(db, 'master/tenants');
            onValue(tenantsRef, (snapshot) => {
                const tenants = snapshot.val() || {};
                const list = document.getElementById('clients-list');
                list.innerHTML = '';

                Object.keys(tenants).forEach(key => {
                    const t = tenants[key];
                    if (t.sellerId === currentSeller.username) {
                        const nextPayment = new Date(t.nextPayment);
                        const createdAt = new Date(t.createdAt);
                        const now = new Date();
                        const diffDays = Math.ceil((nextPayment - now) / (1000 * 60 * 60 * 24));
                        const isExpired = nextPayment < now;
                        
                        // Determinar Status Visual
                        let statusHtml = '';
                        if (t.isBlocked) {
                            statusHtml = '<span style="background: #f3f4f6; color: #374151; padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 700;">⏳ AGUARDANDO ADMIN</span>';
                        } else if (isExpired) {
                            statusHtml = '<span style="background: #fee2e2; color: #b91c1c; padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 700;">🔴 VENCIDO (CONVERTAR)</span>';
                        } else if (diffDays <= 7 && (nextPayment - createdAt) < (10 * 24 * 60 * 60 * 1000)) {
                            statusHtml = `<span style="background: #fef9c3; color: #854d0e; padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 700;">🟡 EM TESTE (${diffDays} dias)</span>`;
                        } else {
                            statusHtml = `<span style="background: #dcfce7; color: #15803d; padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 700;">🟢 ATIVO (RENVOU)</span>`;
                        }

                        const card = document.createElement('div');
                        card.className = 'glass-card';
                        card.style.borderLeft = isExpired ? '5px solid #ef4444' : (t.isBlocked ? '1px solid #ddd' : '5px solid #10b981');
                        
                        card.innerHTML = `
                            <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 12px;">
                                <h3 style="margin: 0; font-family: 'Playfair Display';">${t.name}</h3>
                                ${statusHtml}
                            </div>
                            <div style="font-size: 0.85rem; color: #6b7280; line-height: 1.6;">
                                <p>🔗 <b>Link:</b> centauro-barbearia.vercel.app/?loja=${key}</p>
                                <p>📅 <b>Vencimento:</b> ${nextPayment.toLocaleDateString('pt-BR')}</p>
                                <p>💰 <b>Mensalidade:</b> R$ ${(t.subscriptionPrice || 0).toFixed(2)}</p>
                            </div>
                            <div style="margin-top: 15px; padding-top: 15px; border-top: 1px solid #eee; display: flex; justify-content: space-between; align-items: center;">
                                <a href="https://wa.me/55${(t.phone || '').replace(/\D/g,'')}" target="_blank" 
                                   style="text-decoration: none; background: #25D366; color: white; padding: 8px 15px; border-radius: 8px; font-size: 0.8rem; font-weight: 700; display: flex; align-items: center; gap: 8px;">
                                   📱 Contatar Cliente
                                </a>
                                <span style="font-size: 0.75rem; color: #9ca3af;">ID: ${key}</span>
                            </div>
                        `;
                        list.appendChild(card);
                    }
                });

                if (list.innerHTML === '') {
                    list.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #9ca3af; padding: 40px;">Você ainda não cadastrou nenhuma venda.</p>';
                }
            });
        }

        // New Client Logic
        document.getElementById('new-client-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            btn.disabled = true;
            btn.textContent = 'Criando...';

            const slug = document.getElementById('t-slug').value.toLowerCase().replace(/[^a-z0-9-]/g, '');
            const name = document.getElementById('t-name').value;
            const phone = document.getElementById('t-phone').value;
            const adminUser = document.getElementById('t-admin-user').value;
            const adminPass = document.getElementById('t-admin-pass').value;
            const price = parseFloat(document.getElementById('t-price').value) || 0;

            try {
                // Check if slug exists
                const checkSnapshot = await get(ref(db, 'master/tenants/' + slug));
                if (checkSnapshot.exists()) {
                    alert('Este link já está em uso!');
                    btn.disabled = false;
                    btn.textContent = 'Criar e Enviar p/ Aprovação';
                    return;
                }

                const nextPayment = new Date();
                nextPayment.setDate(nextPayment.getDate() + 30);

                // Create in Master (BLOCKED)
                await set(ref(db, 'master/tenants/' + slug), {
                    name,
                    phone,
                    slug,
                    adminUser,
                    subscriptionPrice: price,
                    nextPayment: nextPayment.toISOString(),
                    createdAt: new Date().toISOString(),
                    isBlocked: true, // INICIA BLOQUEADO
                    sellerId: currentSeller.username // Identifica quem vendeu
                });

                // Create initial DB for tenant
                const initialData = {
                    settings: { shopName: name, agenda: { intervalMin: 30, schedule: { 0: { active: false, open: '09:00', close: '18:00' }, 1: { active: true, open: '09:00', close: '19:00' }, 2: { active: true, open: '09:00', close: '19:00' }, 3: { active: true, open: '09:00', close: '19:00' }, 4: { active: true, open: '09:00', close: '19:00' }, 5: { active: true, open: '09:00', close: '19:00' }, 6: { active: true, open: '09:00', close: '17:00' } } } },
                    staff: [ { id: 1, name: 'Dono Administrador', role: 'admin', login: adminUser, password: adminPass, showInAgenda: false } ],
                    services: [ { id: 1, name: 'Corte Tradicional', price: 35, duration: 30 } ],
                    lastUpdate: new Date().getTime(),
                    updatedBy: 'SellerPanel'
                };
                await set(ref(db, 'tenants/' + slug + '/'), initialData);

                alert('🚀 Sucesso! Cliente cadastrado. Aguarde o Administrador ativar o sistema após o pagamento.');
                document.getElementById('new-client-modal').close();
                e.target.reset();

            } catch (err) {
                console.error(err);
                alert('Erro ao criar cliente.');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Criar e Enviar p/ Aprovação';
            }
        };
    </script>
</body>
</html>
